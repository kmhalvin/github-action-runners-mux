version: '3.8'

services:
  multi-runner-proxy:
    build: .
    image: github-action-runners-mux:latest
    container_name: github-action-runners-mux
    restart: unless-stopped
    # Ensure Docker's stop signal allows the 30-minute graceful drain
    stop_grace_period: 30m
    volumes:
      - ./config.sample.yaml:/etc/multi-listener/config.yaml:ro
      - runner-data:/opt/runners

volumes:
  runner-data:
