version: '3.8'

services:
  github-mux-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: github-mux-proxy:latest
    container_name: github-mux
    restart: unless-stopped
    # Ensure Docker's stop signal allows the 30-minute graceful drain
    stop_grace_period: 30m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.sample.yaml:/etc/github-mux/config.yaml:ro
      - runner-data:/opt/runners

  github-mux-worker:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: github-mux-worker:latest
    profiles:
      - donotstart

volumes:
  runner-data:
