services:
  multi-runner-proxy:
    build: .
    image: github-action-runners-mux:latest
    container_name: github-action-runners-mux
    restart: unless-stopped
    # Ensure Docker's stop signal allows the 30-minute graceful drain
    stop_grace_period: 30m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/etc/multi-listener/config.yaml:ro
    # environment:
    #   - WORKER_START_DOCKER_SERVICE=true  # Enable Docker-in-Docker for workers
    #   - WORKER_IMAGE=github-action-runners-mux:latest  # Custom worker image (optional)
