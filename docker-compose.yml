services:
  github-mux-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: github-mux-proxy:latest
    container_name: github-mux-proxy
    restart: unless-stopped
    stop_grace_period: 30m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./config.yaml:/etc/github-mux/config.yaml:ro
    # environment:
    #   - WORKER_IMAGE=github-mux-worker:latest

  github-mux-worker:
    # We include this so `docker compose build` builds the worker image,
    # ensuring it's available in the local daemon for the Orchestrator to spawn.
    # We set profile to "donotstart" so it doesn't actually run a container on `docker compose up`
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: github-mux-worker:latest
    profiles:
      - donotstart
