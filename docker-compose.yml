version: '3.8'

services:
  github-mux-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: github-mux-proxy:latest
    container_name: github-mux
    environment:
      - DB_PATH=/etc/github-mux/github-mux.db
    restart: unless-stopped
    # Ensure Docker's stop signal allows the 30-minute graceful drain
    stop_grace_period: 30m
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - mux-data:/etc/github-mux
      - runner-data:/opt/runners

  github-mux-worker:
    build:
      context: .
      dockerfile: Dockerfile.runner
    image: github-mux-worker:latest
    profiles:
      - donotstart

volumes:
  runner-data:
  mux-data:
